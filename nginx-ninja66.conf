server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ninja66.ai www.ninja66.ai _;

    root /home/const/subnet66/dash2.0;
    index index.html;

    access_log /var/log/nginx/ninja66.access.log;
    error_log /var/log/nginx/ninja66.error.log warn;

    client_max_body_size 5m;
    keepalive_timeout 15;
    send_timeout 30;
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain;

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /api/submissions {
        proxy_pass http://127.0.0.1:8066/api/submissions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;
        proxy_read_timeout 310s;
        proxy_send_timeout 310s;
        proxy_request_buffering on;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    location = /api/solve-spend {
        proxy_pass http://127.0.0.1:8066/api/solve-spend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    location = /dashboard.json {
        proxy_pass https://s3.hippius.com/constantinople/sn66/dashboard.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = /dashboard-home.json {
        try_files /dashboard-home.json =404;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = /dashboard-summary.json {
        try_files /dashboard-summary.json =404;
        add_header Cache-Control "no-cache, max-age=0" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = /duels/index.json {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/index.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=60" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ "^/duels/([0-9])\.json$" {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/00000$1/duel.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=30" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ "^/duels/([0-9]{2})\.json$" {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/0000$1/duel.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=30" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ "^/duels/([0-9]{3})\.json$" {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/000$1/duel.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=30" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ "^/duels/([0-9]{4})\.json$" {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/00$1/duel.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=30" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ "^/duels/([0-9]{5})\.json$" {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/0$1/duel.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=30" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ "^/duels/([0-9]{6})\.json$" {
        proxy_pass https://s3.hippius.com/constantinople/sn66/duels/$1/duel.json;
        proxy_ssl_server_name on;
        proxy_set_header Host s3.hippius.com;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, max-age=30" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /duels/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, max-age=60" always;
    }
}
